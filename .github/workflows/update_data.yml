name: Atualizar dados CAGED

on:
  schedule:
    # Roda todo dia 25 às 9h (horário UTC) — CAGED é liberado ~dia 20 de cada mês
    - cron: '0 9 25 * *'
  workflow_dispatch:
    # Permite rodar manualmente pela aba Actions do GitHub
    inputs:
      force_month:
        description: 'Forçar mês específico (AAAA-MM), deixe vazio para automático'
        required: false
        default: ''

jobs:
  update-caged:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessário para o commit automático

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache de dependências pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('scripts/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Instalar dependências
        run: |
          pip install -r scripts/requirements.txt

      - name: Criar pasta data/ se não existir
        run: mkdir -p data

      - name: Rodar pipeline de dados
        env:
          FORCE_MONTH: ${{ github.event.inputs.force_month }}
        run: |
          python scripts/fetch_data.py

      - name: Verificar se houve mudanças nos dados
        id: check_changes
        run: |
          git diff --quiet data/ && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commitar e publicar dados atualizados
        if: steps.check_changes.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/caged_latest.json data/metadata.json
          git commit -m "dados: CAGED atualizado $(date +'%Y-%m-%d')"
          git push

      - name: Nenhuma atualização necessária
        if: steps.check_changes.outputs.changed == 'false'
        run: echo "Dados já estão atualizados — nenhum commit necessário."
